<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 한수몰 (HANSOO MALL)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: -1px;
            color: #111;
        }

        .login-container h2 span {
            color: #004d40; /* 한수몰 브랜드 포인트 컬러(에메랄드 그린 계열) */
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #666;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #004d40;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #333;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 13px;
            color: #888;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .login-footer a {
            color: #888;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .home-link {
            margin-top: 30px;
            display: inline-block;
            font-size: 12px;
            color: #999;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>HANSOO <span>MALL</span></h2>
    
    <form>
        <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        
        <button type="submit" class="login-btn">로그인</button>
    </form>
    
    <div class="login-footer">
    <a href="signup_kr.html">회원가입</a>
    <span>|</span>
    <a href="find_id_kr.html">아이디 찾기</a>
    <span>|</span>
    <a href="find_pw_kr.html">비밀번호 찾기</a>
</div>

    <a href="index_kr.html" class="home-link"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
</div>

</body>
</html>
