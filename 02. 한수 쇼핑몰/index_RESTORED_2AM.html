        <style>
            :root {
                --primary-blue: #A2C2E1;
                --secondary-green: #8DA17E;
                --white: #FFFFFF;
                --black: #000000;
                --gray-100: #F8F9FA;
                --gray-200: #E9ECEF;
                --gray-300: #DEE2E6;
                --gray-500: #ADB5BD;
                --gray-800: #343A40;
                --text-dark: #202020;
                --transition-smooth: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
                --transition-fast: all 0.3s ease;
                --font-main: 'Noto Sans KR', sans-serif;
                --font-accent: 'Cormorant Garamond', serif;
            }

            /* --- Checkout Modal Styles --- */
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(5px);
                z-index: 2000;
                display: none;
                align-items: center;
                justify-content: center;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .modal-overlay.active {
                display: flex;
                opacity: 1;
            }

            .checkout-modal {
                background: #fff;
                width: 90%;
                max-width: 600px;
                max-height: 90vh;
                border-radius: 24px;
                overflow-y: auto;
                position: relative;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                padding: 40px;
                transform: translateY(20px);
                transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .modal-overlay.active .checkout-modal {
                transform: translateY(0);
            }

            .modal-close {
                position: absolute;
                top: 25px;
                right: 25px;
                background: #fff;
                border: 2px solid #5F6F52;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #5F6F52;
                transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                box-shadow: 0 4px 15px rgba(95, 111, 82, 0.2);
                z-index: 10;
            }

            .modal-close:hover {
                transform: rotate(90deg) scale(1.1);
                background: #5F6F52;
                color: #fff;
            }

            .checkout-header {
                text-align: center;
                margin-bottom: 35px;
            }

            .checkout-header h2 {
                font-family: var(--font-accent);
                font-size: 32px;
                font-weight: 400;
                letter-spacing: 0.05em;
                margin-bottom: 8px;
            }

            .checkout-header p {
                color: #999;
                font-size: 14px;
            }

            .checkout-section {
                margin-bottom: 30px;
            }

            .checkout-modal .form-group label {
                display: block;
                margin-bottom: 5px;
                font-size: 13px;
            }

            .section-label {
                display: block;
                font-size: 13px;
                font-weight: 700;
                color: var(--secondary-green);
                margin-bottom: 12px;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .form-input {
                width: 100%;
                padding: 14px 18px;
                border: 1px solid #eee;
                border-radius: 12px;
                font-size: 15px;
                transition: all 0.2s;
                background: #fafafa;
            }

            .form-input:focus {
                outline: none;
                border-color: var(--secondary-green);
                background: #fff;
                box-shadow: 0 0 0 4px rgba(141, 161, 126, 0.1);
            }

            /* Order Item Card */
            #cartItemsList {
                max-height: 350px;
                overflow-y: auto;
                padding-right: 10px;
                margin-bottom: 25px;
                scroll-behavior: smooth;
            }

            #cartItemsList::-webkit-scrollbar {
                width: 6px;
            }

            #cartItemsList::-webkit-scrollbar-track {
                background: #f1f1f1;
                border-radius: 10px;
            }

            #cartItemsList::-webkit-scrollbar-thumb {
                background: #5F6F52;
                border-radius: 10px;
            }

            .order-summary-card {
                background: #f8f9fa;
                border-radius: 16px;
                padding: 15px;
                display: flex;
                align-items: center;
                gap: 15px;
                margin-bottom: 12px;
                border: 1px solid #eee;
            }

            .summary-img {
                width: 60px;
                height: 60px;
                background: #fff;
                border-radius: 10px;
                padding: 5px;
                object-fit: contain;
            }

            .summary-info h4 {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 4px;
            }

            .summary-info p {
                font-size: 14px;
                color: #666;
            }

            /* Quantity Control */
            .quantity-control {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-top: 8px;
                background: #fff;
                padding: 4px 10px;
                border-radius: 50px;
                border: 1px solid #eee;
                width: fit-content;
            }

            .qty-btn {
                background: none;
                border: none;
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 16px;
                color: #666;
                transition: all 0.2s;
                border-radius: 50%;
            }

            .qty-btn:hover {
                background: #f0f0f0;
                color: #000;
            }

            .order-qty {
                font-size: 14px;
                font-weight: 700;
                min-width: 15px;
                text-align: center;
            }

            .add-more-btn {
                margin-top: 15px;
                background: none;
                border: 1px dashed var(--secondary-green);
                color: var(--secondary-green);
                padding: 8px 15px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .add-more-btn:hover {
                background: rgba(141, 161, 126, 0.1);
                border-style: solid;
            }

            /* Payment Selection */
            .payment-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .payment-option {
                position: relative;
            }

            .payment-option input {
                position: absolute;
                opacity: 0;
            }

            .payment-label {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 15px;
                border: 1px solid #eee;
                border-radius: 16px;
                cursor: pointer;
                transition: all 0.2s;
                background: #fff;
            }

            .payment-label i {
                font-size: 20px;
                margin-bottom: 8px;
                color: #999;
            }

            .payment-label span {
                font-size: 14px;
                font-weight: 600;
                color: #666;
            }

            .payment-option input:checked+.payment-label {
                border-color: var(--secondary-green);
                background: rgba(141, 161, 126, 0.05);
            }

            .payment-option input:checked+.payment-label i,
            .payment-option input:checked+.payment-label span {
                color: var(--secondary-green);
            }

            /* Cash Receipt Section */
            #cash-receipt-container {
                margin-top: 15px;
                padding: 20px;
                background: #f0f4f1;
                border-radius: 16px;
                display: none;
                animation: slideDown 0.3s ease-out;
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .receipt-types {
                display: flex;
                gap: 15px;
                margin-bottom: 12px;
            }

            .type-label {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
            }

            .type-label input {
                accent-color: var(--secondary-green);
            }

            /* Checkout Footer */
            .checkout-footer {
                margin-top: 40px;
                border-top: 1px solid #eee;
                padding-top: 25px;
            }

            .total-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
            }

            .total-label {
                font-size: 16px;
                font-weight: 600;
                color: #333;
            }

            .total-amount {
                font-size: 24px;
                font-weight: 800;
                color: #000;
            }

            .place-order-btn {
                width: 100%;
                background: var(--black);
                color: #fff;
                border: none;
                padding: 20px;
                border-radius: 50px;
                font-size: 18px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.3s;
            }

            .place-order-btn:hover {
                background: var(--secondary-green);
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(141, 161, 126, 0.3);
            }

            /* --- 실버 메탈릭 효과 (??강력한 버전) --- */
            .silver-wrapper {
                position: relative;
                display: inline-block;
                overflow: hidden;
                border-radius: 8px;
                /* 제품 썸네일과 통일 */
            }

            /* 1. 베이스 레이어(Multiply): 吏꾪븳 ?ㅻ쾭 ?ㅼ쑝濡?蹂寃?*/
            .silver-wrapper::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                /* 더 진하고 풍부한 회색 그라디언트*/
                background: linear-gradient(135deg,
                        rgba(160, 160, 160, 0.6) 0%,
                        rgba(200, 200, 200, 0.8) 25%,
                        rgba(140, 140, 140, 0.6) 50%,
                        rgba(220, 220, 220, 0.9) 60%,
                        rgba(160, 160, 160, 0.6) 80%,
                        rgba(190, 190, 190, 0.7) 100%);
                mix-blend-mode: multiply;
                /* 흰색을 확실히 어둡게*/
                opacity: 0.9;
                /* 嫄곗쓽 遺덊닾紐낇븯寃???쓬 */
                z-index: 1;
                pointer-events: none;
            }

            /* 2. 광택 레이어(Soft Light/Screen): 반짝임 강화 */
            .silver-wrapper::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(110deg,
                        transparent 30%,
                        rgba(255, 255, 255, 0.7) 45%,
                        rgba(255, 255, 255, 1.0) 50%,
                        /* 강한 하이라이트*/
                        rgba(255, 255, 255, 0.7) 55%,
                        transparent 70%);
                mix-blend-mode: soft-light;
                /* ?먮뒗 screen */
                opacity: 0.8;
                z-index: 2;
                pointer-events: none;
            }

            /* 3. ?대?吏 議곗젙: ?鍮꾨? 媛뺥븯寃?二쇱뼱 湲덉냽 ?먮굦 洹밸???*/
            .silver-wrapper img {
                width: 100%;
                display: block;
                border-radius: 8px;
                /* ?대?吏 ?먯껜 ?쇱슫??*/
                filter: contrast(1.3) brightness(0.9) grayscale(1);
                /* grayscale(1): ?꾩쟾 臾댁콈??한수 ?ㅻ쾭) / contrast(1.3): 금속질감 */
            }



            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Noto Sans KR', sans-serif;
                color: var(--text-dark);
                background-color: var(--white);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
                min-width: 1400px;
            }

            a {
                text-decoration: none;
                color: inherit;
                transition: var(--transition-fast);
            }

            ul {
                list-style: none;
            }

            img {
                max-width: 100%;
                display: block;
            }

            /* Scroll Reveal Animation */
            .reveal {
                opacity: 0;
                transform: translateY(40px);
                transition: var(--transition-smooth);
            }

            .reveal.active {
                opacity: 1;
                transform: translateY(0);
            }

            /* Top Banner */
            .top-banner {
                background-color: var(--black);
                color: var(--white);
                text-align: center;
                padding: 10px 0;
                font-size: 13px;
                font-weight: 400;
                letter-spacing: -0.02em;
            }

            .top-banner a {
                text-decoration: underline;
                margin-left: 10px;
            }

            /* Header */
            header {
                position: sticky;
                top: 0;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                z-index: 1000;
                border-bottom: 1px solid var(--gray-200);
                transition: var(--transition-fast);
            }

            .header-inner {
                max-width: 1400px;
                margin: 0 auto;
                padding: 0 40px;
                height: 90px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .logo {
                font-family: 'Cormorant Garamond', serif;
                font-size: 32px;
                font-weight: 300;
                letter-spacing: 0.2em;
            }

            .gnb {
                display: flex;
                gap: 40px;
            }

            .gnb a {
                font-size: 15px;
                font-weight: 500;
                letter-spacing: 0.05em;
            }

            .header-util {
                display: flex;
                gap: 24px;
                align-items: center;
            }

            .header-util a {
                font-size: 14px;
            }

            /* =================================== 
           EDEN Hero Section (Premium Box Layout)
           =================================== */
            .hero {
                position: relative;
                width: 100%;
                aspect-ratio: 16 / 9;
                background-color: #ffffff;
                display: flex;
                align-items: flex-start;
                justify-content: flex-start;
                text-align: left;
                padding: 10px 5% 0;
                /* 留덉뒪?ъ? ?꾩쟾??遺꾨━?섍린 ?꾪빐 理쒖쟻??*/
                overflow: hidden;
                margin-bottom: 60px;
            }

            .hero::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url('image_updated/hero_bg.png');
                /* ??理쒓렐???낅뜲?댄듃??怨좎꽦??諛곌꼍 ?대?吏濡?蹂寃?*/
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                z-index: 1;
            }

            .hero-content {
                position: relative;
                z-index: 2;
                max-width: 320px;
                /* 議곌툑 ???ш쾶 ?ㅼ? */
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(8px);
                padding: 30px;
                /* ?щ갚 ???띿꽦?섍쾶 */
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                margin-top: 5%;
                margin-left: calc((100% - 1400px) / 2 + 50px);
                text-align: left;
            }

            .hero-subtitle {
                font-size: 11px;
                /* ???묎쾶 */
                font-weight: 700;
                letter-spacing: 0.1em;
                color: #00E5FF;
                margin-bottom: 8px;
                text-transform: uppercase;
            }

            .hero-title {
                font-family: 'Cormorant Garamond', serif;
                font-size: 26px;
                /* ?대?吏??而댄뙥?명븳 ?먮굦 */
                font-weight: 400;
                color: #ffffff;
                margin-bottom: 8px;
                line-height: 1.2;
            }

            .hero-tagline {
                font-size: 17px;
                font-weight: 800;
                background: linear-gradient(to right, #00E5FF, #00FF87);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;

            }

            .hero-description {
                font-size: 11px;
                /* ?꾩＜ ?묎쾶 */
                color: #ffffff;
                margin-bottom: 15px;
                letter-spacing: -0.01em;
                line-height: 1.4;
                opacity: 0.9;
            }

            .hero-cta {
                background: #ffffff;
                color: #111;
                padding: 15px 45px;
                /* 議곌툑 ???ㅼ? */
                border-radius: 50px;
                font-size: 14px;
                /* 議곌툑 ???ㅼ? */
                font-weight: 700;
                text-decoration: none;
                transition: all 0.3s ease;
                display: inline-block;
                border: none;

            .hero-cta:hover {
                background: #f0f0f0;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            }

            /* Products list */
            section.main-section {
                padding: 120px 40px;
                max-width: 1400px;
                margin: 0 auto;
            }

            .section-title {
                text-align: center;
                margin-bottom: 80px;
            }

            .section-title h2 {
                font-family: 'Cormorant Garamond', serif;
                font-size: 44px;
                font-weight: 300;
                letter-spacing: 0.1em;
                margin-bottom: 10px;
            }

            .section-title p {
                color: var(--gray-500);
                font-size: 16px;
            }

            .product-list {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 60px 20px;
            }

            .product-item {
                cursor: pointer;
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            .product-item a {
                display: block;
                text-decoration: none;
                flex-grow: 1;
                /*  
            }

            .product-info {
                margin-top: 20px;
                padding-bottom: 20px;
            }

            .product-thumb {
                aspect-ratio: 1/1.2;
                background-color: #EBF5FF;
                /* 프리미엄 ?고븯?섏깋 諛곌꼍 */
                margin-bottom: 20px;
                overflow: hidden;
                position: relative;
                padding: 30px;
                /* ?쒗뭹怨?諛곌꼍 ?ъ씠???띿꽦???щ갚 */

                align-items: center;
                justify-content: center;
                transition: var(--transition-smooth);
            }

            .product-thumb img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);

            /* ?쒗뭹 蹂몄껜留?媛뺤“?섏뿬 蹂댁뿬二쇰뒗 ?ㅽ???(?명룷洹몃옒???щ∼) */
            .pouch-crop {
                width: 210% !important;
                /* ?띿뒪?몃? ?뺤떎??媛由ш린 ?꾪빐 諛곗쑉 理쒖쟻??*/

            /* Conflicting redundant hero styles removed to prevent visual bugs */

                        // --- Image Slider Class ---
                        class ImageSlider {
                            constructor(containerId, startSlide = 0) {
                                this.container = document.getElementById(containerId);
                                if (!this.container) return;

                                this.track = this.container.querySelector('.slider-track');
                                this.slides = this.container.querySelectorAll('.slide');
                                this.totalSlides = this.slides.length;
                                this.currentSlide = startSlide;

                                // Initial setup
                                this.updateSlider();

                                // Button Listeners
                                const prevBtn = this.container.querySelector('.slider-btn.prev');
                                const nextBtn = this.container.querySelector('.slider-btn.next');

                                if (prevBtn) {
                                    // User Request: Left button moves to RIGHT (Next Slide)
                                    prevBtn.addEventListener('click', () => this.moveSlide(1));
                                }
                                if (nextBtn) {
                                    // User Request: Right button moves to LEFT (Prev Slide)
                                    nextBtn.addEventListener('click', () => this.moveSlide(-1));
                                }
                            }

                            moveSlide(direction) {
                                this.currentSlide += direction;
                                if (this.currentSlide < 0) {
                                    this.currentSlide = this.totalSlides - 1;
                                } else if (this.currentSlide >= this.totalSlides) {
                                    this.currentSlide = 0;
                                }
                                this.updateSlider();

                                // Add resize listener to handle responsive width changes
                                window.addEventListener('resize', () => this.updateSlider());
                            }

                            updateSlider() {
                                if (this.track && this.slides.length > 0) {
                                    // Get absolute precise float width
                                    const rect = this.container.getBoundingClientRect();
                                    const containerWidth = rect.width;

                                    this.slides.forEach(slide => {
                                        slide.style.width = `${containerWidth}px`;
                                        slide.style.flex = `0 0 ${containerWidth}px`;

                                    });

                                    // Accurate offset using float width
                                    const offset = this.currentSlide * containerWidth;
                                    this.track.style.transform = `translate3d(-${offset}px, 0, 0)`;
                                }
                            }
                        }

                                if (dots[currentSlide]) dots[currentSlide].classList.add('active');
                            }

                            if (prevBtn) prevBtn.addEventListener('click', () => updateSlider(currentSlide - 1));
                            if (nextBtn) nextBtn.addEventListener('click', () => updateSlider(currentSlide + 1));

                            dots.forEach(dot => {
                                dot.addEventListener('click', () => {
                                    const index = parseInt(dot.getAttribute('data-index'));
                                    updateSlider(index);
                                });
                            });
