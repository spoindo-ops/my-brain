<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기 | 한수몰</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 350px; text-align: center; }
        h2 { font-weight: 700; color: #111; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background-color: #111; color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .back { margin-top: 25px; display: block; font-size: 13px; color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="font-size: 20px;">아이디 찾기</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">가입 시 등록한 이름과 휴대폰 번호를 입력하세요.</p>
        <input type="text" placeholder="이름">
        <input type="text" placeholder="휴대폰 번호 (- 제외)">
        <button onclick="alert('입력하신 정보로 등록된 아이디가 없습니다.')">아이디 찾기</button>
        <a href="login_kr.html" class="back">로그인 페이지로 돌아가기</a>
    </div>
</body>
</html>
