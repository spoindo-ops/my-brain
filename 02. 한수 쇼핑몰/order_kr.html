<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문/결제 | HAN SOO Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        :root {
            --royal-blue: #1565C0;
            --deep-navy: #003366;
            --text: #1a1a1a;
            --green: #8DA17E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text);
            background: #f5f5f5;
            line-height: 1.6;
        }

        .page-wrap {
            max-width: 1060px;
            margin: 50px auto;
            padding: 44px 40px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, .07);
            position: relative;
        }

        .btn-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fff;
            border: 1.5px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            transition: 0.3s;
            z-index: 10;
            cursor: pointer;
        }

        .btn-close:hover {
            background: #000;
            color: #fff;
            transform: rotate(90deg);
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .checkout-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--deep-navy);
            margin-bottom: 8px;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
            font-size: 13px;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 40px;
        }

        .billing-section h3,
        .payment-section h3,
        .order-summary h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 7px;
            font-family: inherit;
        }

        .payment-option {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .payment-option.selected {
            border-color: var(--royal-blue);
            background: rgba(21, 101, 192, 0.05);
        }

        .cart-item {
            display: flex;
            gap: 14px;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }

        .cart-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fff;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-weight: 900;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 0;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 18px;
        }

        .remove-btn:hover {
            color: #ff5a5f;
        }

        .btn-pay {
            width: 100%;
            background: var(--royal-blue);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .page-wrap {
                margin: 10px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">
        <div id="orderUserStatus" class="status-bar"></div>
        <div class="btn-close" onclick="location.href='index_kr.html'"><i class="fas fa-times"></i></div>

        <div class="checkout-header">
            <h1>안전한 결제</h1>
            <p>HAN SOO Premium Skincare Ritual</p>
        </div>

        <div class="shipping-banner"
            style="background:#F4F7F2; color:#63886f; text-align:center; padding:12px; border-radius:10px; margin-bottom:30px; font-weight:700; font-size:14px; border:1px solid #e8ede6;">
            🚚 25,000원 이상 무료배송 — 일반 배송 3,500원
        </div>

        <div class="checkout-grid">
            <div class="billing-section">
                <h3>배송 정보</h3>
                <input type="text" id="receiverName" placeholder="수령인 성함">
                <input type="text" id="receiverPhone" placeholder="연락처 (010-0000-0000)" oninput="autoHyphen(this)">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="receiverAddress" placeholder="주소 (도로명 주소)" readonly style="flex:1;">
                    <button onclick="execDaumPostcode()"
                        style="height:45px; padding:0 15px; background:#8A9A5B; color:#fff; border:none; border-radius:7px; cursor:pointer; font-weight:700;">주소
                        검색</button>
                </div>
                <input type="text" id="receiverDetail" placeholder="상세 주소">

                <h3 style="margin-top:30px;">결제 수단</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="payment-option selected" onclick="selectPay('card', this)">
                        <i class="fas fa-credit-card"></i> 카드 결제
                    </div>
                    <div class="payment-option" onclick="selectPay('bank', this)">
                        <i class="fas fa-university"></i> 무통장 입금
                    </div>
                </div>
            </div>

            <div class="order-summary" style="background:#f9f9f9; padding:25px; border-radius:15px;">
                <h3>주문 요약</h3>
                <div id="cart-list"></div>
                <div style="margin-top:20px; border-top:2px solid #333; padding-top:15px;">
                    <div
                        style="display:flex; justify-content:space-between; color:#666; font-size:14px; margin-bottom:10px;">
                        <span>상품 합계</span>
                        <span id="subtotal-val">0원</span>
                    </div>
                    <div
                        style="display:flex; justify-content:space-between; color:#666; font-size:14px; margin-bottom:15px;">
                        <span>배송비</span>
                        <span id="shipping-val">3,500원</span>
                    </div>
                    <div
                        style="display:flex; justify-content:space-between; font-weight:800; font-size:22px; color:#111;">
                        <span>총 결제 금액</span>
                        <span id="total-krw">0원</span>
                    </div>
                </div>
                <button class="btn-pay" onclick="processPayment()">지금 결제하기</button>
            </div>
        </div>
    </div>

    <script>
        const SHIP_KRW = 3500;
        const FREE_LIMIT = 25000;
        const HS_AUTH_KEY = 'hansoo_auth_user';
        const HS_GUEST_KEY = 'hansoo_guest_user';
        let cart = JSON.parse(localStorage.getItem('hansoo_cart')) || [];

        function _syncHeader() {
            const user = JSON.parse(localStorage.getItem(HS_AUTH_KEY));
            const guest = JSON.parse(sessionStorage.getItem(HS_GUEST_KEY));
            const statusEl = document.getElementById('orderUserStatus');
            if (user && user.isLoggedIn) {
                statusEl.innerHTML = `<span><strong>${user.name}</strong> 님 로그인 중</span> <a href="javascript:void(0)" onclick="handleLogout()" style="color:#e53935; font-weight:700; text-decoration:underline;">로그아웃</a>`;
            } else if (guest && guest.isGuest) {
                statusEl.innerHTML = `<span>비회원 구매 진행 중 (ID: ${guest.guestId})</span> <a href="index_kr.html" style="color:#1565C0; font-weight:700;">로그인하기</a>`;
            } else {
                statusEl.innerHTML = `<span>로그인 후 이용하시면 주문 내역이 저장됩니다.</span> <a href="index_kr.html" style="color:#1565C0; font-weight:700;">로그인</a>`;
            }
        }

        window.handleLogout = function () {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem(HS_AUTH_KEY);
                sessionStorage.removeItem(HS_GUEST_KEY);
                location.href = 'index_kr.html'; // 한글 메인으로
            }
        };

        function renderCart() {
            const list = document.getElementById('cart-list');
            let subtotal = 0;
            if (cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">장바구니가 비어있습니다.</p>';
            } else {
                list.innerHTML = cart.map((item, idx) => {
                    subtotal += item.price * item.quantity;
                    return `<div class="cart-item">
                        <img src="${item.img}" class="cart-img">
                        <div style="flex:1">
                            <div style="font-size:13px; font-weight:700;">${item.name}</div>
                            <div style="font-size:12px; color:#888;">${item.price.toLocaleString()}원</div>
                            <div style="margin-top:5px; display:flex; align-items:center;">
                                <button class="qty-btn" onclick="changeQty(${idx},-1)">-</button>
                                <span style="margin:0 12px; font-weight:700;">${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
                            </div>
                        </div>
                        <button class="remove-btn" onclick="remove(${idx})">×</button>
                    </div>`;
                }).join('');
            }

            let ship = (subtotal >= FREE_LIMIT || subtotal === 0) ? 0 : SHIP_KRW;
            document.getElementById('subtotal-val').innerText = subtotal.toLocaleString() + '원';
            document.getElementById('shipping-val').innerText = ship === 0 ? '무료' : ship.toLocaleString() + '원';
            document.getElementById('total-krw').innerText = (subtotal + ship).toLocaleString() + '원';
        }

        function changeQty(i, d) { cart[i].quantity += d; if (cart[i].quantity < 1) cart[i].quantity = 1; save(); }
        function remove(i) { cart.splice(i, 1); save(); }
        function save() { localStorage.setItem('hansoo_cart', JSON.stringify(cart)); renderCart(); }
        function autoHyphen(t) { t.value = t.value.replace(/[^0-9]/g, '').replace(/^(\d{3})(\d{4})(\d{4})$/, `$1-$2-$3`); }
        function execDaumPostcode() { new daum.Postcode({ oncomplete: d => { document.getElementById('receiverAddress').value = d.roadAddress; } }).open(); }
        function selectPay(type, el) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        function processPayment() {
            if (cart.length === 0) return alert('상품을 담아주세요.');
            
            let amount = 0;
            cart.forEach(item => amount += (item.price * item.quantity));
            if (amount < FREE_LIMIT) amount += SHIP_KRW;

            const tossPayments = TossPayments('test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq');

            tossPayments.requestPayment('카드', {
                amount: amount,
                orderId: 'ORDER_' + new Date().getTime(),
                orderName: cart.length > 1 ? `${cart[0].name} 외 ${cart.length - 1}건` : cart[0].name,
                customerName: document.getElementById('receiverName').value.trim() || '비회원 고객',
                successUrl: window.location.origin + '/index_kr.html',
                failUrl: window.location.origin + '/order_kr.html',
            }).catch(function (error) {
                if (error.code === 'USER_CANCEL') {
                    // 결제 고객이 결제창을 닫았을 때 에러 처리
                } else if (error.code === 'INVALID_CARD_COMPANY') {
                    // 유효하지 않은 카드 코드에 대한 에러 처리
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => { _syncHeader(); renderCart(); });
    </script>
</body>

</html>
